  coverage-report:
    needs: [cov-buffer, cov-transaction, cov-index, cov-lock, cov-ha, cov-framework, cov-datamanager, cov-undo]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Install lcov
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lcov > /dev/null

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-parts
          pattern: cov-*

      - name: Merge coverage reports
        id: coverage
        run: |
          args=""
          for f in coverage-parts/*/coverage.info; do
            args="$args --add-tracefile $f"
          done
          lcov $args --output-file merged.info --quiet

          # Extract overall coverage percentage
          SUMMARY=$(lcov --summary merged.info 2>&1)
          LINES_PCT=$(echo "$SUMMARY" | grep 'lines' | sed 's/.*: //' | sed 's/%.*//')
          FUNCS_PCT=$(echo "$SUMMARY" | grep 'functions' | sed 's/.*: //' | sed 's/%.*//')
          BRANCHES_PCT=$(echo "$SUMMARY" | grep 'branches' | sed 's/.*: //' | sed 's/%.*//')

          echo "lines_pct=${LINES_PCT}" >> $GITHUB_OUTPUT
          echo "funcs_pct=${FUNCS_PCT}" >> $GITHUB_OUTPUT
          echo "branches_pct=${BRANCHES_PCT}" >> $GITHUB_OUTPUT

          # Write Job Summary
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | ${LINES_PCT}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | ${FUNCS_PCT}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | ${BRANCHES_PCT}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Details" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          lcov --list merged.info >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const lines = '${{ steps.coverage.outputs.lines_pct }}';
            const funcs = '${{ steps.coverage.outputs.funcs_pct }}';
            const branches = '${{ steps.coverage.outputs.branches_pct }}';
            const body = `## Coverage Report\n\n| Metric | Coverage |\n|--------|----------|\n| Lines | ${lines}% |\n| Functions | ${funcs}% |\n| Branches | ${branches}% |\n\n> Generated by DStore Coverage pipeline`;

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: merged.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
