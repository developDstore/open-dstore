  coverage-report:
    needs: [cov-buffer, cov-transaction, cov-index, cov-lock, cov-ha, cov-framework, cov-datamanager, cov-undo]
    runs-on: ubuntu-latest
    steps:
      - name: Install lcov
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lcov > /dev/null

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-parts
          pattern: cov-*

      - name: Merge coverage reports
        run: |
          args=""
          for f in coverage-parts/*/coverage.info; do
            args="$args --add-tracefile $f"
          done
          lcov $args --output-file merged.info --quiet
          echo "## Coverage Summary"
          lcov --list merged.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: merged.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
