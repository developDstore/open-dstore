name: DStore Coverage

on:
  pull_request:
    branches: [main]

jobs:
  cov-buffer:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/developdstore/open-dstore-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    env:
      BUILD_ROOT: ${{ github.workspace }}
      LOCAL_LIB_PATH: /opt/project/local_libs
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          source ${BUILD_ROOT}/buildenv
          cd ${BUILD_ROOT}/utils && bash build.sh -m release
          cd ${BUILD_ROOT} && mkdir -p tmp_build && cd tmp_build
          cmake .. -DCMAKE_BUILD_TYPE=debug -DUTILS_PATH=../utils/output -DENABLE_UT=ON -DENABLE_LCOV=ON
          make -sj$(nproc) install
      - name: Run Buffer UT
        run: |
          source ${BUILD_ROOT}/buildenv
          cd ${BUILD_ROOT}/tmp_build
          make run_dstore_buffer_unittest || true
      - name: Collect coverage
        run: |
          source ${BUILD_ROOT}/buildenv
          apt-get update -qq && apt-get install -y -qq lcov > /dev/null
          cd ${BUILD_ROOT}/tmp_build
          lcov --capture --directory . --output-file coverage.info --gcov-tool ${GCCFOLDER}/gcc/bin/gcov --quiet
          lcov --remove coverage.info '/usr/*' '*/local_libs/*' '*/tests/*' '*/utils/*' --output-file coverage.info --quiet
      - uses: actions/upload-artifact@v4
        with:
          name: cov-buffer
          path: tmp_build/coverage.info
          retention-days: 1

