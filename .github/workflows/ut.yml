name: DStore UT

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/developdstore/open-dstore-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      BUILD_ROOT: ${{ github.workspace }}
      LOCAL_LIB_PATH: /opt/project/local_libs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build utils
        run: |
          source ${BUILD_ROOT}/buildenv
          cd ${BUILD_ROOT}/utils
          bash build.sh -m release

      - name: Build dstore (debug with UT)
        run: |
          source ${BUILD_ROOT}/buildenv
          cd ${BUILD_ROOT}
          mkdir -p tmp_build && cd tmp_build
          cmake .. -DCMAKE_BUILD_TYPE=debug -DUTILS_PATH=../utils/output -DENABLE_UT=ON
          make -sj$(nproc) install

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dstore-build
          path: |
            ${{ github.workspace }}/tmp_build
            ${{ github.workspace }}/utils/output
            ${{ github.workspace }}/output
            ${{ github.workspace }}/tests
            ${{ github.workspace }}/buildenv
            ${{ github.workspace }}/build_script
          retention-days: 1

  ut-buffer:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/developdstore/open-dstore-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    env:
      BUILD_ROOT: ${{ github.workspace }}
      LOCAL_LIB_PATH: /opt/project/local_libs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dstore-build
          path: ${{ github.workspace }}
      - name: Run Buffer UT
        run: |
          source ${BUILD_ROOT}/buildenv
          cd ${BUILD_ROOT}/tmp_build
          make run_dstore_buffer_unittest

  ut-transaction:
