    defaults:
      run:
        shell: bash
    env:
      BUILD_ROOT: ${{ github.workspace }}
      LOCAL_LIB_PATH: /opt/project/local_libs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dstore-build
          path: ${{ github.workspace }}
      - name: Run Transaction UT
        run: |
          source ${BUILD_ROOT}/buildenv
          cd ${BUILD_ROOT}/tmp_build
          make run_dstore_xact_unittest

  ut-index:
